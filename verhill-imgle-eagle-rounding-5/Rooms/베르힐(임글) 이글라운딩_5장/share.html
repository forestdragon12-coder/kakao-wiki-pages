<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>대홍의시대 공유 문구</title>
  <style>
    :root {
      --ink: #17130f;
      --muted: #6d6257;
      --line: #ded3c5;
      --paper: #fbf7ef;
      --panel: #fffdf8;
      --accent: #0f6b55;
      --accent-dark: #0a4a3c;
      --warning: #8a4b08;
      --warning-bg: #fff2d8;
      --shadow: 0 22px 70px rgba(31, 24, 17, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        linear-gradient(135deg, rgba(15, 107, 85, 0.08), rgba(255, 242, 216, 0.45)),
        var(--paper);
      font-family: "Apple SD Gothic Neo", "Noto Sans KR", system-ui, sans-serif;
      line-height: 1.65;
    }

    main {
      width: min(920px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 46px 0 56px;
    }

    .eyebrow {
      margin: 0 0 8px;
      color: var(--accent-dark);
      font-size: 14px;
      font-weight: 800;
      letter-spacing: 0;
    }

    h1 {
      margin: 0;
      font-size: clamp(34px, 6vw, 64px);
      line-height: 1.02;
      letter-spacing: 0;
    }

    .lead {
      width: min(720px, 100%);
      margin: 18px 0 30px;
      color: var(--muted);
      font-size: 18px;
    }

    .share-panel {
      padding: 24px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .panel-head {
      display: flex;
      gap: 16px;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    h2 {
      margin: 0;
      font-size: 20px;
      letter-spacing: 0;
    }

    button {
      min-height: 44px;
      padding: 0 18px;
      border: 0;
      border-radius: 8px;
      color: #fff;
      background: var(--accent);
      font: inherit;
      font-weight: 800;
      cursor: pointer;
    }

    button:hover {
      background: var(--accent-dark);
    }

    textarea {
      display: block;
      width: 100%;
      min-height: 270px;
      resize: vertical;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--ink);
      background: #fffaf1;
      font: 17px/1.72 "Apple SD Gothic Neo", "Noto Sans KR", system-ui, sans-serif;
    }

    .notice {
      margin: 18px 0 0;
      padding: 14px 16px;
      border: 1px solid #f0c57c;
      border-radius: 8px;
      color: var(--warning);
      background: var(--warning-bg);
      font-weight: 700;
    }

    .links {
      display: grid;
      gap: 10px;
      margin-top: 18px;
      color: var(--muted);
      font-size: 15px;
    }

    .links a {
      color: var(--accent-dark);
      font-weight: 800;
      overflow-wrap: anywhere;
    }

    .toast {
      min-height: 24px;
      margin: 10px 0 0;
      color: var(--accent-dark);
      font-weight: 800;
    }

    @media (max-width: 640px) {
      main {
        width: min(100vw - 20px, 920px);
        padding-top: 28px;
      }

      .panel-head {
        align-items: stretch;
        flex-direction: column;
      }

      button {
        width: 100%;
      }

      textarea {
        min-height: 360px;
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <main>
    <p class="eyebrow">KakaoTalk share copy</p>
    <h1>대홍의시대 공유 문구</h1>
    <p class="lead">카톡에 바로 붙여넣을 수 있게 짧게 정리했습니다.</p>

    <section class="share-panel" aria-labelledby="share-title">
      <div class="panel-head">
        <h2 id="share-title">보낼 문구</h2>
        <button id="copy-button" type="button">문구 복사</button>
      </div>
      <textarea id="share-text" readonly>대홍의시대 24시간 흐름 정리해둠.

정정길이 점심 얘기 꺼내면서 바로 모임 잡혔고,
영호가 호두과자 사업 얘기 올리면서 응원 분위기로 이어짐.

중간중간 사진 리액션, 화환 농담, 도일이 얘기랑 AI 농담까지 섞여서
전체적으로는 점심 모임 + 사업 응원 + 사진 놀림 흐름이었음.

전체 보기:
https://forestdragon12-coder.github.io/kakao-wiki-pages/verhill-imgle-eagle-rounding-5/Rooms/%EB%B2%A0%EB%A5%B4%ED%9E%90%28%EC%9E%84%EA%B8%80%29%20%EC%9D%B4%EA%B8%80%EB%9D%BC%EC%9A%B4%EB%94%A9_5%EC%9E%A5/index.html</textarea>
      <p id="copy-status" class="toast" aria-live="polite"></p>
      <p class="notice">외부 공유는 공개 배포가 완료된 뒤 열립니다.</p>
      <div class="links">
        <div>로컬 미리보기: <a href="index.html">대홍의시대 위키 보기</a></div>
        <div>배포 후 공유 링크: <a href="https://forestdragon12-coder.github.io/kakao-wiki-pages/verhill-imgle-eagle-rounding-5/Rooms/%EB%B2%A0%EB%A5%B4%ED%9E%90%28%EC%9E%84%EA%B8%80%29%20%EC%9D%B4%EA%B8%80%EB%9D%BC%EC%9A%B4%EB%94%A9_5%EC%9E%A5/index.html">GitHub Pages 링크</a></div>
      </div>
    </section>
  </main>

  <script>
    const button = document.getElementById("copy-button");
    const textarea = document.getElementById("share-text");
    const status = document.getElementById("copy-status");

    button.addEventListener("click", async () => {
      try {
        await navigator.clipboard.writeText(textarea.value);
        status.textContent = "복사했습니다. 카톡 입력창에 붙여넣으면 됩니다.";
      } catch (error) {
        textarea.focus();
        textarea.select();
        status.textContent = "자동 복사가 막혔습니다. 선택된 문구를 직접 복사하세요.";
      }
    });
  </script>
</body>
</html>
