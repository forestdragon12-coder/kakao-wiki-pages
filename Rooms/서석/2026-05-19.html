<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>서석 2026-05-19</title>
  <style>
    * {
      box-sizing: border-box;
    }
    :root {
      color-scheme: light;
      --ink: #1f2933;
      --muted: #697386;
      --line: #d8dee9;
      --paper: #ffffff;
      --soft: #f5f7fa;
      --accent: #1f7a8c;
    }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: var(--soft);
      line-height: 1.55;
      overflow-x: hidden;
    }
    main {
      width: 100%;
      max-width: 1040px;
      margin: 0 auto;
      padding: 32px 20px 56px;
    }
    header {
      border-bottom: 2px solid var(--line);
      margin-bottom: 24px;
      padding-bottom: 16px;
    }
    h1, h2 {
      line-height: 1.2;
      margin: 0 0 12px;
    }
    h1 { font-size: 30px; }
    h2 {
      border-top: 1px solid var(--line);
      font-size: 21px;
      margin-top: 28px;
      padding-top: 20px;
    }
    .meta {
      color: var(--muted);
      display: flex;
      flex-wrap: wrap;
      gap: 10px 18px;
      font-size: 14px;
    }
    .meta span {
      max-width: 100%;
      overflow-wrap: anywhere;
    }
    .panel {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px;
      margin: 16px 0;
    }
    .report h1 {
      font-size: 28px;
      margin-bottom: 22px;
    }
    .report h3 {
      font-size: 18px;
      margin: 0 0 10px;
    }
    .issue-card {
      border: 1px solid var(--line);
      border-left: 4px solid var(--accent);
      border-radius: 8px;
      margin: 14px 0;
      padding: 14px 16px;
      background: #fbfcfe;
    }
    .date-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(min(100%, 180px), 1fr));
      gap: 10px;
      padding: 0;
    }
    .date-grid li {
      list-style: none;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 12px;
      background: #fbfcfe;
    }
    .link-note {
      color: var(--muted);
      font-size: 13px;
      margin-top: 4px;
      overflow-wrap: anywhere;
    }
    a {
      color: var(--accent);
      overflow-wrap: anywhere;
      word-break: break-word;
    }
    p, li {
      overflow-wrap: anywhere;
      word-break: keep-all;
    }
    ul { padding-left: 22px; }
    li { margin: 6px 0; }
    .message-list li {
      border-bottom: 1px solid var(--line);
      list-style: none;
      margin: 0;
      padding: 9px 0;
    }
    .message-list {
      padding: 0;
    }
    .sender {
      font-weight: 700;
    }
    .time {
      color: var(--muted);
      font-size: 13px;
      margin-right: 8px;
    }
    @media (max-width: 640px) {
      main {
        padding: 16px 10px 32px;
      }
      header {
        margin-bottom: 14px;
        padding-bottom: 12px;
      }
      h1 {
        font-size: 24px;
      }
      h2 {
        font-size: 18px;
        margin-top: 22px;
        padding-top: 16px;
      }
      .report h1 {
        font-size: 23px;
        margin-bottom: 18px;
      }
      .report h3 {
        font-size: 16px;
      }
      .meta {
        display: grid;
        grid-template-columns: 1fr;
        gap: 6px;
        font-size: 12px;
      }
      .panel {
        border-radius: 6px;
        margin: 12px 0;
        padding: 12px;
      }
      .issue-card {
        border-left-width: 3px;
        border-radius: 6px;
        margin: 10px 0;
        padding: 11px 10px;
      }
      ul {
        padding-left: 18px;
      }
      li {
        margin: 5px 0;
      }
      .date-grid {
        grid-template-columns: 1fr;
      }
      .link-note {
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
<main>

<header>
  <h1>서석 - 2026-05-19</h1>
  <div class="meta">
    <span>메시지 2개</span>
    <span>링크 0개</span>
    <span><a href="index.html">방 인덱스</a></span>
    <span>공유 URL: https://forestdragon12-coder.github.io/kakao-wiki-pages/Rooms/%EC%84%9C%EC%84%9D/2026-05-19.html</span>
  </div>
</header>
<section class="panel">
  <h2>일자 지표</h2>
  <ul>
    <li>메시지 2개</li>
    <li>참여자 1명</li>
    <li>링크 0개</li>
  </ul>
  <p>원문 대화 로그와 공유 링크 원문 목록은 공개 HTML에 싣지 않습니다. 방 전체 인덱스의 LLM 보고서를 기준으로 확인하세요.</p>
</section>

</main>
</body>
</html>
